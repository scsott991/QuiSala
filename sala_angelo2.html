<script>
var DEVICE_ID = 'ANGELO';
var PIN_LOGIN = '031091';
var PIN_ADMIN = '031091';
var SOGLIA_CONFERMA = 200;
var SUPABASE_URL = 'https://xldbpjkqjiqwhumfkduq.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsZGJwamtxamlxd2h1bWZrZHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDk3MDQsImV4cCI6MjA5MDYyNTcwNH0.0vg_udelZYAAeZTctQNpp2J8l1-qFVbybA_mUyElvq4';

var clienti = [];
var movimenti = [];
var currentClientId = null;
var pinBuffer = '';
var adminPinBuffer = '';
var adminPinCallback = null;
var wsConnected = false;

function sbFetch(path, options) {
  var opts = options || {};
  var headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': opts.prefer || 'return=representation' };
  if (opts.headers) { for (var k in opts.headers) { headers[k] = opts.headers[k]; } }
  return fetch(SUPABASE_URL + '/rest/v1/' + path, { method: opts.method || 'GET', headers: headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
}

function loadAll() {
  return Promise.all([
    sbFetch('clienti?select=*').then(function(r) { return r.json(); }),
    sbFetch('movimenti?select=*&order=ts.desc').then(function(r) { return r.json(); })
  ]).then(function(results) {
    clienti = results[0] || []; movimenti = results[1] || [];
    renderClientList(); if (currentClientId) { renderStorico(); } updateSyncDot(true);
  }).catch(function(err) { console.error('Load error:', err); updateSyncDot(false); });
}

function connectRealtime() {
  try {
    var wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0';
    var ws = new WebSocket(wsUrl); var heartbeatInterval = null; var ref = 0;
    ws.onopen = function() {
      ref++; ws.send(JSON.stringify({ topic:'realtime:public:clienti', event:'phx_join', payload:{ config:{ broadcast:{self:false}, postgres_changes:[{event:'*',schema:'public',table:'clienti'}] } }, ref:String(ref) }));
      ref++; ws.send(JSON.stringify({ topic:'realtime:public:movimenti', event:'phx_join', payload:{ config:{ broadcast:{self:false}, postgres_changes:[{event:'*',schema:'public',table:'movimenti'}] } }, ref:String(ref) }));
      heartbeatInterval = setInterval(function() { ref++; ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:String(ref)})); }, 30000);
      updateSyncDot(true); wsConnected = true;
    };
    ws.onmessage = function(e) { try { var msg = JSON.parse(e.data); if (msg.event === 'postgres_changes') { loadAll(); } } catch(ex) {} };
    ws.onclose = function() { wsConnected = false; updateSyncDot(false); if (heartbeatInterval) clearInterval(heartbeatInterval); setTimeout(connectRealtime, 3000); };
    ws.onerror = function() { wsConnected = false; updateSyncDot(false); ws.close(); };
  } catch(ex) { setTimeout(connectRealtime, 3000); }
}

function updateSyncDot(online) { var dot = document.getElementById('syncDot'); if (online) { dot.classList.add('online'); } else { dot.classList.remove('online'); } }

function pinPress(n) {
  if (pinBuffer.length >= 6) return; pinBuffer += n; updatePinDots();
  if (pinBuffer.length === 6) {
    if (pinBuffer === PIN_LOGIN) { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('appContainer').classList.add('visible'); loadAll(); connectRealtime(); }
    else { var dots = document.querySelectorAll('#pinDots .pin-dot'); for (var i = 0; i < dots.length; i++) { dots[i].classList.add('error'); } setTimeout(function() { pinBuffer = ''; updatePinDots(); for (var j = 0; j < dots.length; j++) { dots[j].classList.remove('error'); } }, 500); }
  }
}
function pinDelete() { if (pinBuffer.length > 0) { pinBuffer = pinBuffer.slice(0, -1); updatePinDots(); } }
function updatePinDots() { for (var i = 0; i < 6; i++) { var d = document.getElementById('dot' + i); if (i < pinBuffer.length) { d.classList.add('filled'); } else { d.classList.remove('filled'); } } }

function requestAdminPin(title, callback) { adminPinBuffer = ''; adminPinCallback = callback; document.getElementById('pinModalTitle').textContent = title || 'PIN Admin'; document.getElementById('pinModalOverlay').classList.add('visible'); updateAdminPinDots(); }
function adminPinPress(n) {
  if (adminPinBuffer.length >= 6) return; adminPinBuffer += n; updateAdminPinDots();
  if (adminPinBuffer.length === 6) {
    if (adminPinBuffer === PIN_ADMIN) { document.getElementById('pinModalOverlay').classList.remove('visible'); if (adminPinCallback) adminPinCallback(); adminPinCallback = null; }
    else { var dots = document.querySelectorAll('#adminPinDots .pin-dot'); for (var i = 0; i < dots.length; i++) { dots[i].classList.add('error'); } setTimeout(function() { adminPinBuffer = ''; updateAdminPinDots(); var dots2 = document.querySelectorAll('#adminPinDots .pin-dot'); for (var j = 0; j < dots2.length; j++) { dots2[j].classList.remove('error'); } }, 500); }
  }
}
function adminPinDelete() { if (adminPinBuffer.length > 0) { adminPinBuffer = adminPinBuffer.slice(0, -1); updateAdminPinDots(); } }
function updateAdminPinDots() { for (var i = 0; i < 6; i++) { var d = document.getElementById('adot' + i); if (i < adminPinBuffer.length) { d.classList.add('filled'); } else { d.classList.remove('filled'); } } }

/* Normalizzazione per ricerca (case + accent insensitive) */
function normalizeText(s) {
  if (!s) return '';
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

/* Iniziali: 2 lettere se c'è cognome, altrimenti 1 */
function getInitials(nome) {
  if (!nome) return '?';
  var parts = nome.trim().split(/\s+/);
  if (parts.length >= 2) { return (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase(); }
  return parts[0].charAt(0).toUpperCase();
}

/* Distingue "Mario" (ricerca) da "Mario 50" (comando) */
function parseCommand(val) {
  var trimmed = (val || '').trim();
  if (!trimmed) return { mode: 'empty' };
  var parts = trimmed.match(/^(.+?)\s+(-?\d+(?:[.,]\d{1,2})?)$/);
  if (parts) {
    var nome = parts[1].trim();
    var importo = parseFloat(parts[2].replace(',', '.'));
    if (!isNaN(importo) && importo !== 0) { return { mode: 'command', nome: nome, importo: importo }; }
  }
  return { mode: 'search', query: trimmed };
}

function renderClientList() {
  var list = document.getElementById('clientList');
  var rawVal = document.getElementById('mainInput') ? document.getElementById('mainInput').value : '';
  var parsed = parseCommand(rawVal);
  var searchQuery = '';
  if (parsed.mode === 'search') searchQuery = parsed.query;
  else if (parsed.mode === 'command') searchQuery = parsed.nome;
  var searchNorm = normalizeText(searchQuery);

  /* Ricerca ibrida: peso 2 = inizia per, peso 1 = contiene */
  var filtered = [];
  clienti.forEach(function(c) {
    var nomeNorm = normalizeText(c.nome);
    var weight = 0;
    if (!searchNorm) { weight = 1; }
    else if (nomeNorm.indexOf(searchNorm) === 0) { weight = 2; }
    else if (nomeNorm.indexOf(searchNorm) !== -1) { weight = 1; }
    if (weight > 0) {
      c._saldo = calcSaldo(c.id);
      c._ultimoMov = getUltimoMov(c.id);
      c._weight = weight;
      filtered.push(c);
    }
  });

  /* Ordinamento: sempre per ultimo movimento (più recente in alto).
     In ricerca: prima peso, poi ultimo movimento. */
  if (searchNorm) {
    filtered.sort(function(a, b) {
      if (a._weight !== b._weight) return b._weight - a._weight;
      return (b._ultimoMov || 0) - (a._ultimoMov || 0);
    });
  } else {
    filtered.sort(function(a, b) { return (b._ultimoMov || 0) - (a._ultimoMov || 0); });
  }

  if (filtered.length === 0) {
    var emptyHtml = '<div class="empty-state">';
    if (parsed.mode === 'command') {
      emptyHtml += 'Cliente "' + escHtml(parsed.nome) + '" non trovato<br>';
      emptyHtml += '<div class="empty-state-create" onclick="processCommand()">Crea "' + escHtml(parsed.nome) + '" con ' + formatEuro(Math.abs(parsed.importo)) + '</div>';
    } else if (searchQuery) {
      emptyHtml += 'Nessun cliente trovato per "' + escHtml(searchQuery) + '"';
    } else {
      emptyHtml += 'Nessun cliente';
    }
    emptyHtml += '</div>';
    list.innerHTML = emptyHtml; return;
  }

  var html = '';
  filtered.forEach(function(c) {
    var saldo = c._saldo;
    var amountClass = saldo > 0 ? 'amount-red' : (saldo < 0 ? 'amount-green' : 'amount-zero');
    var badgeClass, badgeText;
    if (saldo > 0) { badgeClass = 'badge-deve'; badgeText = 'DEVE'; }
    else if (saldo < 0) { badgeClass = 'badge-credito'; badgeText = 'CREDITO'; }
    else { badgeClass = 'badge-saldato'; badgeText = 'SALDATO'; }
    var ultimoStr = c._ultimoMov ? formatDate(c._ultimoMov) : 'Nuovo';
    var avatarCls = saldo > 0 ? 'avatar-red' : (saldo === 0 ? 'avatar-grey' : 'avatar-green');
    var initials = getInitials(c.nome);
    var highlightCls = (parsed.mode === 'command' && normalizeText(c.nome) === normalizeText(parsed.nome)) ? ' highlight' : '';
    html += '<div class="client-card' + highlightCls + '" onclick="openStorico(\'' + c.id + '\')">';
    html += '<div class="client-avatar ' + avatarCls + '">' + initials + '</div>';
    html += '<div class="client-info"><div class="client-name">' + escHtml(c.nome) + '</div>';
    html += '<div class="client-meta"><span class="client-badge ' + badgeClass + '">' + badgeText + '</span><span class="client-date">' + ultimoStr + '</span></div></div>';
    html += '<div class="client-amount ' + amountClass + '">' + formatEuro(Math.abs(saldo)) + '</div>';
    html += '<div class="client-arrow">&#8250;</div></div>';
  });
  list.innerHTML = html;
}

function calcSaldo(clienteId) { var total = 0; movimenti.forEach(function(m) { if (m.cliente_id === clienteId) { total += parseFloat(m.delta); } }); return Math.round(total * 100) / 100; }
function getUltimoMov(clienteId) { var last = 0; movimenti.forEach(function(m) { if (m.cliente_id === clienteId && m.ts > last) { last = m.ts; } }); return last; }

function onMainInputChange() {
  var val = document.getElementById('mainInput').value;
  var clearBtn = document.getElementById('clearBtn');
  var sendBtn = document.getElementById('sendBtn');
  if (val.length > 0) { clearBtn.classList.add('visible'); } else { clearBtn.classList.remove('visible'); }
  var parsed = parseCommand(val);
  if (parsed.mode === 'command') { sendBtn.classList.add('visible'); }
  else { sendBtn.classList.remove('visible'); }
  renderClientList();
}

function clearInput() {
  document.getElementById('mainInput').value = '';
  onMainInputChange();
  document.getElementById('mainInput').focus();
}

function processCommand() {
  var input = document.getElementById('mainInput');
  var val = (input.value || '').trim();
  var parsed = parseCommand(val);
  if (parsed.mode !== 'command') { showToast('Formato: nome importo (es: Mario 50)'); return; }
  var nome = parsed.nome;
  var importo = parsed.importo;

  if (Math.abs(importo) >= SOGLIA_CONFERMA) {
    var tipoTxt = importo > 0 ? 'sospeso' : 'rientro';
    showModal('Conferma importo', 'Registrare ' + formatEuro(Math.abs(importo)) + ' come ' + tipoTxt + ' per "' + escHtml(nome) + '"?', [
      { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
      { text: 'Conferma', cls: 'modal-btn-confirm', action: function() { hideModal(); executeCommand(nome, importo); } }
    ]);
    return;
  }
  executeCommand(nome, importo);
}

function executeCommand(nome, importo) {
  var existing = clienti.find(function(c) { return normalizeText(c.nome) === normalizeText(nome); });
  if (existing) { addMovimento(existing.id, existing.nome, importo); clearInput(); }
  else {
    showModal('Nuovo Cliente', 'Creare "' + escHtml(nome) + '" come nuovo cliente?', [
      { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
      { text: 'Crea', cls: 'modal-btn-confirm', action: function() { hideModal(); createCliente(nome, importo); clearInput(); } }
    ]);
  }
}

function createCliente(nome, importo) {
  var id = 'c_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); var ts = Date.now();
  sbFetch('clienti', { method: 'POST', body: { id: id, nome: nome, creato_il: ts, creato_da: DEVICE_ID } }).then(function() { logAction('nuovo_cliente', nome, null, null); if (importo) { addMovimento(id, nome, importo); } return loadAll(); }).then(function() { showToast(nome + ' creato'); }).catch(function() { showToast('Errore creazione'); });
}

var _addMovLock = false;
function addMovimento(clienteId, clienteNome, importo) {
  if (_addMovLock) return;
  _addMovLock = true;
  var tipo = importo > 0 ? 'sospeso' : 'rientro'; var delta = importo; var ts = Date.now();
  var nota = ''; var noteEl = document.getElementById('noteInput'); if (noteEl) { nota = (noteEl.value || '').trim(); noteEl.value = ''; }
  sbFetch('movimenti', { method: 'POST', body: { cliente_id: clienteId, ts: ts, tipo: tipo, delta: delta, device: DEVICE_ID, nota: nota || null } })
    .then(function() { logAction(tipo, clienteNome, delta, nota || null); return loadAll(); })
    .then(function() { showToast(tipo === 'sospeso' ? '+' + formatEuro(Math.abs(importo)) + ' sospeso' : formatEuro(Math.abs(importo)) + ' rientro'); _addMovLock = false; })
    .catch(function() { showToast('Errore operazione'); _addMovLock = false; });
}

function logAction(azione, clienteNome, delta, dettaglio) { sbFetch('log', { method: 'POST', body: { ts: Date.now(), azione: azione, cliente_nome: clienteNome, delta: delta, device: DEVICE_ID, dettaglio: dettaglio } }).catch(function(err) { console.error('Log error:', err); }); }

function openStorico(id) { currentClientId = id; document.getElementById('storicoScreen').classList.add('visible'); document.getElementById('noteInput').value = ''; document.getElementById('movImporto').value = ''; renderStorico(); }
function closeStorico() { currentClientId = null; document.getElementById('storicoScreen').classList.remove('visible'); }

function addMovFromStorico(tipo) {
  var cliente = clienti.find(function(c) { return c.id === currentClientId; }); if (!cliente) return;
  var input = document.getElementById('movImporto');
  var val = (input.value || '').replace(',', '.').trim();
  var importo = parseFloat(val);
  if (isNaN(importo) || importo <= 0) { showToast('Inserisci un importo valido'); return; }
  var delta = tipo === 'sospeso' ? importo : -importo;

  if (Math.abs(delta) >= SOGLIA_CONFERMA) {
    showModal('Conferma importo', 'Registrare ' + formatEuro(importo) + ' come ' + tipo + ' per ' + escHtml(cliente.nome) + '?', [
      { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
      { text: 'Conferma', cls: 'modal-btn-confirm', action: function() { hideModal(); input.value = ''; addMovimento(currentClientId, cliente.nome, delta); } }
    ]);
    return;
  }
  input.value = '';
  addMovimento(currentClientId, cliente.nome, delta);
}

function saldaTutto() {
  var cliente = clienti.find(function(c) { return c.id === currentClientId; }); if (!cliente) return;
  var saldo = calcSaldo(currentClientId);
  if (saldo === 0) { showToast('Già saldato'); return; }
  var importo = -saldo;
  var tipoTxt = saldo > 0 ? 'rientro' : 'rettifica';
  showModal('Salda tutto?', 'Registrare ' + formatEuro(Math.abs(saldo)) + ' come ' + tipoTxt + ' per chiudere il conto di ' + escHtml(cliente.nome) + '?', [
    { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
    { text: 'Salda', cls: 'modal-btn-confirm', action: function() { hideModal(); addMovimento(currentClientId, cliente.nome, importo); } }
  ]);
}

function renderStorico() {
  var cliente = clienti.find(function(c) { return c.id === currentClientId; }); if (!cliente) return;
  document.getElementById('storicoTitle').textContent = cliente.nome; var saldo = calcSaldo(currentClientId);
  var box = document.getElementById('saldoBox'); var val = document.getElementById('saldoValue');
  box.className = 'saldo-box'; val.className = 'saldo-value';
  if (saldo > 0) { box.classList.add('red'); val.classList.add('red'); }
  else if (saldo < 0) { box.classList.add('green'); val.classList.add('green'); }
  else { box.classList.add('orange'); val.classList.add('orange'); }
  val.textContent = formatEuro(Math.abs(saldo));

  var quickBtn = document.getElementById('quickSaldaBtn');
  if (saldo === 0) { quickBtn.classList.add('disabled'); quickBtn.textContent = 'Saldato'; }
  else { quickBtn.classList.remove('disabled'); quickBtn.textContent = saldo > 0 ? 'Salda Tutto (' + formatEuro(saldo) + ')' : 'Azzera Credito'; }

  var movs = movimenti.filter(function(m) { return m.cliente_id === currentClientId; }); movs.sort(function(a, b) { return b.ts - a.ts; });
  var html = '';
  movs.forEach(function(m) {
    var isSospeso = m.tipo === 'sospeso';
    html += '<div class="mov-item"><div class="mov-icon ' + m.tipo + '">' + (isSospeso ? '&#8593;' : '&#8595;') + '</div>';
    html += '<div class="mov-info"><div class="mov-tipo ' + m.tipo + '">' + (isSospeso ? 'Sospeso' : 'Rientro') + '</div>';
    html += '<div class="mov-detail">' + formatDateTime(m.ts) + ' &middot; da ' + (m.device || '?') + '</div>';
    if (m.nota) { html += '<div class="mov-nota">' + escHtml(m.nota) + '</div>'; }
    html += '</div>';
    html += '<div class="mov-amount ' + (isSospeso ? 'amount-red' : 'amount-green') + '">' + (isSospeso ? '+' : '-') + formatEuro(Math.abs(parseFloat(m.delta))) + '</div></div>';
  });
  if (movs.length === 0) { html = '<div class="empty-state">Nessun movimento</div>'; }
  document.getElementById('movList').innerHTML = html;
}

function deleteCliente() {
  requestAdminPin('PIN Admin per eliminare', function() {
    var cliente = clienti.find(function(c) { return c.id === currentClientId; }); if (!cliente) return;
    showModal('Elimina ' + cliente.nome + '?', 'Tutti i movimenti verranno cancellati definitivamente. Operazione irreversibile.', [
      { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
      { text: 'Elimina', cls: 'modal-btn-danger', action: function() { hideModal(); logAction('elimina_cliente', cliente.nome, null, 'Saldo al momento: ' + formatEuro(calcSaldo(currentClientId))); sbFetch('movimenti?cliente_id=eq.' + currentClientId, { method: 'DELETE' }).then(function() { return sbFetch('clienti?id=eq.' + currentClientId, { method: 'DELETE' }); }).then(function() { closeStorico(); return loadAll(); }).then(function() { showToast(cliente.nome + ' eliminato'); }); } }
    ]);
  });
}

function exportWhatsAppAll() {
  var lines = ['*SALA - Riepilogo Debitori*', ''];
  var debitori = [];
  clienti.forEach(function(c) { var s = calcSaldo(c.id); if (s > 0) { debitori.push({ nome: c.nome, saldo: s }); } });
  debitori.sort(function(a, b) { return b.saldo - a.saldo; }); var totale = 0;
  debitori.forEach(function(d) { lines.push(d.nome + ': ' + formatEuro(d.saldo)); totale += d.saldo; });
  lines.push(''); lines.push('*Totale aperto: ' + formatEuro(totale) + '*'); lines.push('Debitori: ' + debitori.length + '/' + clienti.length); lines.push(''); lines.push(formatDateTime(Date.now()) + ' - ' + DEVICE_ID);
  window.open('https://wa.me/?text=' + encodeURIComponent(lines.join('\n')), '_blank');
}

function exportWhatsAppCliente() {
  var cliente = clienti.find(function(c) { return c.id === currentClientId; }); if (!cliente) return;
  var saldo = calcSaldo(currentClientId); var movs = movimenti.filter(function(m) { return m.cliente_id === currentClientId; }); movs.sort(function(a, b) { return a.ts - b.ts; });
  var lines = ['*SALA - Report ' + cliente.nome + '*', ''];
  movs.forEach(function(m) { var tipo = m.tipo === 'sospeso' ? '+' : '-'; var riga = formatDateTime(m.ts) + ' | ' + tipo + formatEuro(Math.abs(parseFloat(m.delta))) + ' (' + (m.device || '?') + ')'; if (m.nota) riga += ' - ' + m.nota; lines.push(riga); });
  lines.push(''); lines.push('*Saldo: ' + formatEuro(Math.abs(saldo)) + (saldo > 0 ? ' (da pagare)' : saldo < 0 ? ' (in credito)' : ' (saldato)') + '*');
  window.open('https://wa.me/?text=' + encodeURIComponent(lines.join('\n')), '_blank');
}

function openAdmin() { requestAdminPin('PIN Admin', function() { document.getElementById('adminScreen').classList.add('visible'); renderAdmin(); }); }
function closeAdmin() { document.getElementById('adminScreen').classList.remove('visible'); }

function renderAdmin() {
  var scroll = document.getElementById('adminScroll'); var html = '';
  var totaleAperto = 0; var numDebitori = 0;
  clienti.forEach(function(c) { var s = calcSaldo(c.id); if (s > 0) { totaleAperto += s; numDebitori++; } });
  html += '<div class="admin-section"><div class="admin-section-title">Situazione Attuale</div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Totale aperto</span><span class="admin-stat-value" style="color:#C8102E">' + formatEuro(totaleAperto) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Debitori</span><span class="admin-stat-value">' + numDebitori + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Clienti totali</span><span class="admin-stat-value">' + clienti.length + '</span></div></div>';

  var now = Date.now(); var weekAgo = now - 7*24*60*60*1000; var weekSospesi = 0, weekRientri = 0;
  movimenti.forEach(function(m) { if (m.ts >= weekAgo) { if (m.tipo === 'sospeso') weekSospesi += Math.abs(parseFloat(m.delta)); else weekRientri += Math.abs(parseFloat(m.delta)); } });
  var prevWeekStart = weekAgo - 7*24*60*60*1000; var prevWeekSospesi = 0, prevWeekRientri = 0;
  movimenti.forEach(function(m) { if (m.ts >= prevWeekStart && m.ts < weekAgo) { if (m.tipo === 'sospeso') prevWeekSospesi += Math.abs(parseFloat(m.delta)); else prevWeekRientri += Math.abs(parseFloat(m.delta)); } });
  var weekTrend = weekSospesi > prevWeekSospesi ? '&#8593; Aumentati' : (weekSospesi < prevWeekSospesi ? '&#8595; Diminuiti' : '&#8596; Stabili');
  var weekTrendRientri = weekRientri > prevWeekRientri ? '&#8593; Aumentati' : (weekRientri < prevWeekRientri ? '&#8595; Diminuiti' : '&#8596; Stabili');
  html += '<div class="admin-section"><div class="admin-section-title">Report Settimanale</div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Sospesi</span><span class="admin-stat-value" style="color:#C8102E">' + formatEuro(weekSospesi) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Trend sospesi</span><span class="admin-stat-value">' + weekTrend + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Rientri</span><span class="admin-stat-value" style="color:#1a7a4a">' + formatEuro(weekRientri) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Trend rientri</span><span class="admin-stat-value">' + weekTrendRientri + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Periodo</span><span class="admin-stat-value">' + formatDate(weekAgo) + ' - ' + formatDate(now) + '</span></div></div>';

  var monthAgo = now - 30*24*60*60*1000; var monthSospesi = 0, monthRientri = 0;
  movimenti.forEach(function(m) { if (m.ts >= monthAgo) { if (m.tipo === 'sospeso') monthSospesi += Math.abs(parseFloat(m.delta)); else monthRientri += Math.abs(parseFloat(m.delta)); } });
  var prevMonthStart = monthAgo - 30*24*60*60*1000; var prevMonthSospesi = 0;
  movimenti.forEach(function(m) { if (m.ts >= prevMonthStart && m.ts < monthAgo) { if (m.tipo === 'sospeso') prevMonthSospesi += Math.abs(parseFloat(m.delta)); } });
  var monthTrend = monthSospesi > prevMonthSospesi ? '&#8593; Aumentati' : (monthSospesi < prevMonthSospesi ? '&#8595; Diminuiti' : '&#8596; Stabili');
  html += '<div class="admin-section"><div class="admin-section-title">Report Mensile</div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Sospesi</span><span class="admin-stat-value" style="color:#C8102E">' + formatEuro(monthSospesi) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Rientri</span><span class="admin-stat-value" style="color:#1a7a4a">' + formatEuro(monthRientri) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Trend</span><span class="admin-stat-value">' + monthTrend + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Periodo</span><span class="admin-stat-value">' + formatDate(monthAgo) + ' - ' + formatDate(now) + '</span></div></div>';

  var debitori = []; clienti.forEach(function(c) { var s = calcSaldo(c.id); if (s > 0) { debitori.push({ nome: c.nome, saldo: s }); } }); debitori.sort(function(a, b) { return b.saldo - a.saldo; });
  html += '<div class="admin-section"><div class="admin-section-title">Classifica Debitori</div>';
  if (debitori.length === 0) { html += '<div style="color:#aaa;font-size:14px;padding:8px 0;">Nessun debitore</div>'; }
  debitori.forEach(function(d, idx) { html += '<div class="admin-debitor"><span style="font-size:14px;color:#1a1a1a;font-weight:600;">' + (idx+1) + '. ' + escHtml(d.nome) + '</span><span style="font-size:14px;font-weight:700;color:#C8102E;">' + formatEuro(d.saldo) + '</span></div>'; });
  html += '</div>';

  html += '<div class="admin-section"><div class="admin-section-title">Log Operazioni</div>';
  html += '<div class="admin-filter" id="logFilter"><div class="admin-filter-btn active" onclick="filterLog(\'tutti\', this)">Tutti</div><div class="admin-filter-btn" onclick="filterLog(\'ANGELO\', this)">Angelo</div><div class="admin-filter-btn" onclick="filterLog(\'PINO\', this)">Pino</div></div>';
  html += '<div id="logList"></div></div>';
  html += '<div class="admin-section"><div class="admin-section-title">Backup</div>';
  html += '<div class="admin-backup-btn btn-export" onclick="exportJSON()">Export JSON</div>';
  html += '<div class="admin-backup-btn btn-wa-backup" onclick="exportBackupWA()">Invia Backup WhatsApp</div>';
  html += '<label class="admin-backup-btn btn-import">Import Backup<input type="file" accept=".json" style="display:none;" onchange="importJSON(this)"></label>';
  var lastBackup = localStorage.getItem('sala_last_backup_' + DEVICE_ID);
  if (lastBackup) { html += '<div style="font-size:12px;color:#aaa;text-align:center;margin-top:4px;">Ultimo backup: ' + formatDateTime(parseInt(lastBackup)) + '</div>'; }
  html += '</div>';
  scroll.innerHTML = html; loadLog('tutti');
}

var currentLogFilter = 'tutti';
function filterLog(filter, el) { currentLogFilter = filter; var btns = document.querySelectorAll('#logFilter .admin-filter-btn'); for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); } if (el) el.classList.add('active'); loadLog(filter); }

function loadLog(filter) {
  var url = 'log?select=*&order=ts.desc&limit=50'; if (filter && filter !== 'tutti') { url += '&device=eq.' + filter; }
  sbFetch(url).then(function(r) { return r.json(); }).then(function(logs) {
    var container = document.getElementById('logList'); if (!container) return; var html = '';
    if (!logs || logs.length === 0) { html = '<div style="color:#aaa;font-size:14px;padding:8px 0;">Nessun log</div>'; }
    (logs || []).forEach(function(l) {
      var actionColor = '#1a1a1a';
      if (l.azione === 'sospeso') actionColor = '#C8102E'; else if (l.azione === 'rientro') actionColor = '#1a7a4a'; else if (l.azione === 'elimina_cliente') actionColor = '#C8102E'; else if (l.azione === 'nuovo_cliente') actionColor = '#1E2D5A';
      html += '<div class="admin-log-item"><span class="admin-log-action" style="color:' + actionColor + '">' + escHtml(l.azione) + '</span>';
      if (l.delta !== null && l.delta !== undefined) { html += ' ' + formatEuro(Math.abs(parseFloat(l.delta))); }
      html += ' &middot; ' + escHtml(l.cliente_nome);
      html += '<div class="admin-log-detail">' + formatDateTime(l.ts) + ' &middot; ' + (l.device || '?');
      if (l.dettaglio) html += ' &middot; ' + escHtml(l.dettaglio); html += '</div></div>';
    });
    container.innerHTML = html;
  }).catch(function() { var container = document.getElementById('logList'); if (container) container.innerHTML = '<div style="color:#C8102E;font-size:14px;padding:8px 0;">Errore caricamento log</div>'; });
}

function exportJSON() {
  var data = { clienti: clienti, movimenti: movimenti, exportDate: Date.now(), device: DEVICE_ID };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'SALA_backup_' + DEVICE_ID + '_' + new Date().toISOString().slice(0, 10) + '.json'; a.click(); URL.revokeObjectURL(url);
  localStorage.setItem('sala_last_backup_' + DEVICE_ID, String(Date.now())); showToast('Backup scaricato');
}

function exportBackupWA() {
  var data = { clienti: clienti.length, movimenti: movimenti.length, totaleAperto: 0, debitori: 0 };
  clienti.forEach(function(c) { var s = calcSaldo(c.id); if (s > 0) { data.totaleAperto += s; data.debitori++; } });
  var lines = ['*SALA Backup Info*', 'Data: ' + formatDateTime(Date.now()), 'Device: ' + DEVICE_ID, 'Clienti: ' + data.clienti, 'Movimenti: ' + data.movimenti, 'Debitori: ' + data.debitori, 'Totale aperto: ' + formatEuro(data.totaleAperto), '', '(Scarica il backup JSON per il file completo)'];
  window.open('https://wa.me/?text=' + encodeURIComponent(lines.join('\n')), '_blank');
  localStorage.setItem('sala_last_backup_' + DEVICE_ID, String(Date.now()));
}

function importJSON(input) {
  var file = input.files[0]; if (!file) return; var reader = new FileReader();
  reader.onload = function(e) { try { var data = JSON.parse(e.target.result); if (!data.clienti || !data.movimenti) { showToast('File non valido'); return; }
    showModal('Importa Backup', 'Sovrascrivere tutti i dati? (' + data.clienti.length + ' clienti, ' + data.movimenti.length + ' movimenti)', [
      { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
      { text: 'Importa', cls: 'modal-btn-danger', action: function() { hideModal(); doImport(data); } }
    ]); } catch(ex) { showToast('Errore lettura file'); } }; reader.readAsText(file);
}

function doImport(data) {
  showToast('Importazione in corso...');
  sbFetch('movimenti?id=gt.0', { method: 'DELETE' }).then(function() { return sbFetch('clienti?id=neq.null', { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } }); })
  .then(function() { return sbFetch('clienti', { method: 'POST', body: data.clienti }); })
  .then(function() { var movs = data.movimenti.map(function(m) { return { cliente_id: m.cliente_id, ts: m.ts, tipo: m.tipo, delta: m.delta, device: m.device, nota: m.nota || null }; }); return sbFetch('movimenti', { method: 'POST', body: movs }); })
  .then(function() { return loadAll(); }).then(function() { showToast('Backup importato!'); renderAdmin(); }).catch(function() { showToast('Errore importazione'); });
}

(function() {
  var wrapper = null; var indicator = null; var startY = 0; var pulling = false;
  function init() {
    wrapper = document.getElementById('clientListWrapper'); indicator = document.getElementById('pullIndicator'); if (!wrapper) return;
    wrapper.addEventListener('touchstart', function(e) { var list = document.getElementById('clientList'); if (list.scrollTop <= 0) { startY = e.touches[0].pageY; pulling = true; } }, { passive: true });
    wrapper.addEventListener('touchmove', function(e) { if (!pulling) return; var dy = e.touches[0].pageY - startY; if (dy > 0 && dy < 120) { indicator.style.height = Math.min(dy * 0.6, 50) + 'px'; } }, { passive: true });
    wrapper.addEventListener('touchend', function() { if (!pulling) return; pulling = false; var h = parseInt(indicator.style.height) || 0; indicator.style.height = '0px'; if (h > 30) { loadAll(); showToast('Aggiornato'); } }, { passive: true });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { setTimeout(init, 100); }
})();

function showModal(title, text, buttons) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalText').textContent = text; var btnsHtml = ''; buttons.forEach(function(b, i) { btnsHtml += '<div class="modal-btn ' + b.cls + '" id="modalBtn' + i + '">' + b.text + '</div>'; }); document.getElementById('modalBtns').innerHTML = btnsHtml; buttons.forEach(function(b, i) { document.getElementById('modalBtn' + i).onclick = b.action; }); document.getElementById('modalOverlay').classList.add('visible'); }
function hideModal() { document.getElementById('modalOverlay').classList.remove('visible'); }
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2000); }
function formatEuro(n) { return n.toFixed(2).replace('.', ',') + ' \u20AC'; }
function formatDate(ts) { var d = new Date(ts); return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear(); }
function formatDateTime(ts) { var d = new Date(ts); return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + d.getFullYear() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()); }
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function escHtml(s) { if (s === null || s === undefined) return ''; var div = document.createElement('div'); div.appendChild(document.createTextNode(s)); return div.innerHTML; }
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function() {}); }

document.addEventListener('DOMContentLoaded', function() {
  var mi = document.getElementById('mainInput');
  if (mi) {
    mi.addEventListener('input', onMainInputChange);
    mi.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        var parsed = parseCommand(mi.value);
        if (parsed.mode === 'command') { processCommand(); }
      }
    });
  }
});
</script>
