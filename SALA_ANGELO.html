// ===== SUPABASE REST =====
function sbFetch(path, options) {
  var opts = options || {};
  var headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation'
  };
  if (opts.headers) {
    for (var k in opts.headers) { headers[k] = opts.headers[k]; }
  }
  return fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: opts.method || 'GET',
    headers: headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
}

  }).catch(function(err) {

// ===== REALTIME =====
function connectRealtime() {
  try {
    var wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0';
    var ws = new WebSocket(wsUrl);
    var heartbeatInterval = null;
    var ref = 0;

    ws.onopen = function() {
      ref++;
      ws.send(JSON.stringify({
        topic: 'realtime:public:clienti',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, postgres_changes: [{ event: '*', schema: 'public', table: 'clienti' }] } },
        ref: String(ref)
      }));
      ref++;
      ws.send(JSON.stringify({
        topic: 'realtime:public:movimenti',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, postgres_changes: [{ event: '*', schema: 'public', table: 'movimenti' }] } },
        ref: String(ref)
      }));
      heartbeatInterval = setInterval(function() {
        ref++;
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: String(ref) }));
      }, 30000);
      updateSyncDot(true);
      wsConnected = true;
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.event === 'postgres_changes') {
          loadAll();
        }
      } catch(ex) {}
    };

    ws.onclose = function() {
      wsConnected = false;
      updateSyncDot(false);
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      setTimeout(connectRealtime, 3000);
    };

    ws.onerror = function() {
      wsConnected = false;
      updateSyncDot(false);
      ws.close();
    };
  } catch(ex) {
    setTimeout(connectRealtime, 3000);
  }
}

// ===== RENDER CLIENT LIST =====
function renderClientList() {
  var list = document.getElementById('clientList');
  var search = (document.getElementById('searchInput').value || '').toLowerCase();
  var filtered = clienti.filter(function(c) {
    return c.nome.toLowerCase().indexOf(search) !== -1;
  });

  // Calc saldi
  filtered.forEach(function(c) {
    c._saldo = calcSaldo(c.id);
    c._ultimoMov = getUltimoMov(c.id);
    c._numMov = movimenti.filter(function(m) { return m.cliente_id === c.id; }).length;
  });

  // Sort
  if (currentSort === 'saldo') {
    filtered.sort(function(a, b) { return Math.abs(b._saldo) - Math.abs(a._saldo); });
  } else if (currentSort === 'nome') {
    filtered.sort(function(a, b) { return a.nome.localeCompare(b.nome); });
  } else if (currentSort === 'data') {
    filtered.sort(function(a, b) { return (b._ultimoMov || 0) - (a._ultimoMov || 0); });
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">Nessun cliente</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(c) {
    var saldo = c._saldo;
    var amountClass = saldo > 0 ? 'amount-red' : (saldo < 0 ? 'amount-green' : 'amount-zero');
    var badgeClass = saldo === 0 ? 'badge-saldato' : 'badge-da-pagare';
    var badgeText = saldo === 0 ? 'Saldato' : (c._numMov + ' mov.');
    var ultimoStr = c._ultimoMov ? formatDate(c._ultimoMov) : '';

    html += '<div class="client-card" onclick="openStorico(\'' + c.id + '\')">';
    html += '<div class="client-info">';
    html += '<div class="client-name">' + escHtml(c.nome) + '</div>';
    html += '<div class="client-meta"><span class="client-badge ' + badgeClass + '">' + badgeText + '</span>' + ultimoStr + '</div>';
    html += '</div>';
    html += '<div class="client-amount ' + amountClass + '">' + formatEuro(Math.abs(saldo)) + '</div>';
    html += '<div class="client-arrow">&#8250;</div>';
    html += '</div>';
  });
  list.innerHTML = html;
}

function calcSaldo(clienteId) {
  var total = 0;
  movimenti.forEach(function(m) {
    if (m.cliente_id === clienteId) {
      total += parseFloat(m.delta);
    }
  });
  return Math.round(total * 100) / 100;
}

function getUltimoMov(clienteId) {
  var last = 0;
  movimenti.forEach(function(m) {
    if (m.cliente_id === clienteId && m.ts > last) { last = m.ts; }
  });
  return last;
}

// ===== COMMAND BAR =====
function processCommand() {
  var input = document.getElementById('commandInput');
  var val = (input.value || '').trim();
  if (!val) return;

  // Parse "nome importo"
  var parts = val.match(/^(.+?)\s+(-?\d+(?:[.,]\d{1,2})?)$/);
  if (!parts) {
    showToast('Formato: nome importo');
    return;
  }

  var nome = parts[1].trim();
  var importo = parseFloat(parts[2].replace(',', '.'));
  if (isNaN(importo) || importo === 0) {
    showToast('Importo non valido');
    return;
  }

  // Check if client exists
  var existing = clienti.find(function(c) { return c.nome.toLowerCase() === nome.toLowerCase(); });
  if (existing) {
    addMovimento(existing.id, existing.nome, importo);
    input.value = '';
  } else {
    showModal(
      'Nuovo Cliente',
      'Creare "' + escHtml(nome) + '" come nuovo cliente?',
      [
        { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
        { text: 'Crea', cls: 'modal-btn-confirm', action: function() {
          hideModal();
          createCliente(nome, importo);
          input.value = '';
        }}
      ]
    );
  }
}

function createCliente(nome, importo) {
  var id = 'c_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  var ts = Date.now();
  sbFetch('clienti', {
    method: 'POST',
    body: { id: id, nome: nome, creato_il: ts, creato_da: DEVICE_ID }
  }).then(function() {
    logAction('nuovo_cliente', nome, null, null);
    if (importo) { addMovimento(id, nome, importo); }
    return loadAll();
  }).then(function() {
    showToast(nome + ' creato');
  }).catch(function(err) {
    showToast('Errore creazione');
  });
}

function addMovimento(clienteId, clienteNome, importo) {
  var tipo = importo > 0 ? 'sospeso' : 'rientro';
  var delta = importo > 0 ? importo : importo; // keep sign: positive for sospeso, negative for rientro
  var ts = Date.now();
  var nota = '';
  var noteEl = document.getElementById('noteInput');
  if (noteEl) { nota = (noteEl.value || '').trim(); noteEl.value = ''; }

  sbFetch('movimenti', {
    method: 'POST',
    body: { cliente_id: clienteId, ts: ts, tipo: tipo, delta: delta, device: DEVICE_ID }
  }).then(function() {
    logAction(tipo, clienteNome, delta, nota || null);
    return loadAll();
  }).then(function() {
    showToast(tipo === 'sospeso' ? '+' + formatEuro(Math.abs(importo)) + ' sospeso' : formatEuro(Math.abs(importo)) + ' rientro');
  }).catch(function(err) {
    showToast('Errore operazione');
  });
}

function logAction(azione, clienteNome, delta, dettaglio) {
  sbFetch('log', {
    method: 'POST',
    body: { ts: Date.now(), azione: azione, cliente_nome: clienteNome, delta: delta, device: DEVICE_ID, dettaglio: dettaglio }
  }).catch(function(err) { console.error('Log error:', err); });
}

    html += '</div>';
    html += '<div class="mov-amount ' + (isSospeso ? 'amount-red' : 'amount-green') + '">' + (isSospeso ? '+' : '-') + formatEuro(Math.abs(parseFloat(m.delta))) + '</div>';
    html += '</div>';
  });

  if (movs.length === 0) {
    html = '<div class="empty-state">Nessun movimento</div>';
  }
  document.getElementById('movList').innerHTML = html;
}

function setupQuickButtons() {
  var btns = document.querySelectorAll('.quick-btn');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      var amount = parseInt(btn.getAttribute('data-amount'));

      btn.ontouchstart = function(e) {
        longPressTriggered = false;
        longPressTimer = setTimeout(function() {
          longPressTriggered = true;
          var cliente = clienti.find(function(c) { return c.id === currentClientId; });
          if (cliente) { addMovimento(currentClientId, cliente.nome, -amount); }
        }, 500);
      };

      btn.ontouchend = function(e) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (!longPressTriggered) {
          var cliente = clienti.find(function(c) { return c.id === currentClientId; });
          if (cliente) { addMovimento(currentClientId, cliente.nome, amount); }
        }
        longPressTriggered = false;
      };

      btn.ontouchcancel = function() {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        longPressTriggered = false;
      };

      // Mouse fallback
      btn.onmousedown = function() {
        longPressTriggered = false;
        longPressTimer = setTimeout(function() {
          longPressTriggered = true;
          var cliente = clienti.find(function(c) { return c.id === currentClientId; });
          if (cliente) { addMovimento(currentClientId, cliente.nome, -amount); }
        }, 500);
      };
      btn.onmouseup = function() {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (!longPressTriggered) {
          var cliente = clienti.find(function(c) { return c.id === currentClientId; });
          if (cliente) { addMovimento(currentClientId, cliente.nome, amount); }
        }
        longPressTriggered = false;
      };
    })(btns[i]);
  }
}

          });
        }}
      ]
    );
  });
}

function exportWhatsAppAll() {
  var lines = ['*SALA - Riepilogo Debitori*', ''];

    lines.push(d.nome + ': ' + formatEuro(d.saldo));

  lines.push('*Totale aperto: ' + formatEuro(totale) + '*');

  lines.push('');
  lines.push(formatDateTime(Date.now()) + ' - ' + DEVICE_ID);

  var text = encodeURIComponent(lines.join('\n'));

}

function renderAdmin() {
  var scroll = document.getElementById('adminScroll');
  var html = '';

  // Situazione attuale
  var totaleAperto = 0;
  var numDebitori = 0;
  clienti.forEach(function(c) {
    var s = calcSaldo(c.id);
    if (s > 0) { totaleAperto += s; numDebitori++; }
  });

  html += '<div class="admin-section">';
  html += '<div class="admin-section-title">Situazione Attuale</div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Totale aperto</span><span class="admin-stat-value" style="color:#C8102E">' + formatEuro(totaleAperto) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Debitori</span><span class="admin-stat-value">' + numDebitori + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Totale clienti</span><span class="admin-stat-value">' + clienti.length + '</span></div>';
  html += '</div>';

  // Report settimanale
  var now = Date.now();
  var weekAgo = now - 7 * 24 * 60 * 60 * 1000;
  var weekSospesi = 0, weekRientri = 0;
  movimenti.forEach(function(m) {
    if (m.ts >= weekAgo) {
      if (m.tipo === 'sospeso') weekSospesi += Math.abs(parseFloat(m.delta));
      else weekRientri += Math.abs(parseFloat(m.delta));
    }
  });
  var prevWeekStart = weekAgo - 7 * 24 * 60 * 60 * 1000;
  var prevWeekSospesi = 0;
  movimenti.forEach(function(m) {
    if (m.ts >= prevWeekStart && m.ts < weekAgo) {
      if (m.tipo === 'sospeso') prevWeekSospesi += Math.abs(parseFloat(m.delta));
    }
  });
  var weekTrend = weekSospesi > prevWeekSospesi ? '&#8593; Aumentati' : (weekSospesi < prevWeekSospesi ? '&#8595; Diminuiti' : '&#8596; Stabili');

  html += '<div class="admin-section">';
  html += '<div class="admin-section-title">Report Settimanale</div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Sospesi</span><span class="admin-stat-value" style="color:#C8102E">' + formatEuro(weekSospesi) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Rientri</span><span class="admin-stat-value" style="color:#1a7a4a">' + formatEuro(weekRientri) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Trend sospesi</span><span class="admin-stat-value">' + weekTrend + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Periodo</span><span class="admin-stat-value">' + formatDate(weekAgo) + ' - ' + formatDate(now) + '</span></div>';
  html += '</div>';

  // Report mensile
  var monthAgo = now - 30 * 24 * 60 * 60 * 1000;
  var monthSospesi = 0, monthRientri = 0;
  movimenti.forEach(function(m) {
    if (m.ts >= monthAgo) {
      if (m.tipo === 'sospeso') monthSospesi += Math.abs(parseFloat(m.delta));
      else monthRientri += Math.abs(parseFloat(m.delta));
    }
  });
  var prevMonthStart = monthAgo - 30 * 24 * 60 * 60 * 1000;
  var prevMonthSospesi = 0;
  movimenti.forEach(function(m) {
    if (m.ts >= prevMonthStart && m.ts < monthAgo) {
      if (m.tipo === 'sospeso') prevMonthSospesi += Math.abs(parseFloat(m.delta));
    }
  });
  var monthTrend = monthSospesi > prevMonthSospesi ? '&#8593; Aumentati' : (monthSospesi < prevMonthSospesi ? '&#8595; Diminuiti' : '&#8596; Stabili');

  html += '<div class="admin-section">';
  html += '<div class="admin-section-title">Report Mensile</div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Sospesi</span><span class="admin-stat-value" style="color:#C8102E">' + formatEuro(monthSospesi) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Rientri</span><span class="admin-stat-value" style="color:#1a7a4a">' + formatEuro(monthRientri) + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Trend sospesi</span><span class="admin-stat-value">' + monthTrend + '</span></div>';
  html += '<div class="admin-stat"><span class="admin-stat-label">Periodo</span><span class="admin-stat-value">' + formatDate(monthAgo) + ' - ' + formatDate(now) + '</span></div>';
  html += '</div>';

  // Classifica debitori
  var debitori = [];
  clienti.forEach(function(c) {
    var s = calcSaldo(c.id);
    if (s > 0) { debitori.push({ nome: c.nome, saldo: s }); }
  });
  debitori.sort(function(a, b) { return b.saldo - a.saldo; });

  html += '<div class="admin-section">';
  html += '<div class="admin-section-title">Classifica Debitori</div>';
  if (debitori.length === 0) {
    html += '<div style="color:#888888;font-size:14px;padding:8px 0;">Nessun debitore</div>';
  }
  debitori.forEach(function(d, idx) {
    html += '<div class="admin-debitor"><span style="font-size:14px;color:#1a1a1a;">' + (idx + 1) + '. ' + escHtml(d.nome) + '</span><span style="font-size:14px;font-weight:700;color:#C8102E;">' + formatEuro(d.saldo) + '</span></div>';
  });
  html += '</div>';

  // Log operazioni
  html += '<div class="admin-section">';
  html += '<div class="admin-section-title">Log Operazioni</div>';
  html += '<div class="admin-filter" id="logFilter">';
  html += '<div class="admin-filter-btn active" onclick="filterLog(\'tutti\', this)">Tutti</div>';
  html += '<div class="admin-filter-btn" onclick="filterLog(\'ANGELO\', this)">Angelo</div>';
  html += '<div class="admin-filter-btn" onclick="filterLog(\'PINO\', this)">Pino</div>';
  html += '</div>';
  html += '<div id="logList"></div>';
  html += '</div>';

  // Backup
  html += '<div class="admin-section">';
  html += '<div class="admin-section-title">Backup</div>';
  html += '<div class="admin-backup-btn btn-export" onclick="exportJSON()">Export JSON</div>';
  html += '<div class="admin-backup-btn btn-wa-backup" onclick="exportBackupWA()">Invia Backup WhatsApp</div>';
  html += '<label class="admin-backup-btn btn-import">';
  html += 'Import Backup';
  html += '<input type="file" accept=".json" style="display:none;" onchange="importJSON(this)">';
  html += '</label>';
  var lastBackup = localStorage.getItem('sala_last_backup_' + DEVICE_ID);
  if (lastBackup) {
    html += '<div style="font-size:12px;color:#888888;text-align:center;margin-top:4px;">Ultimo backup: ' + formatDateTime(parseInt(lastBackup)) + '</div>';
  }
  html += '</div>';

  scroll.innerHTML = html;
  loadLog('tutti');
}

var currentLogFilter = 'tutti';
function filterLog(filter, el) {
  currentLogFilter = filter;
  var btns = document.querySelectorAll('#logFilter .admin-filter-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
  if (el) el.classList.add('active');
  loadLog(filter);
}

function loadLog(filter) {
  var url = 'log?select=*&order=ts.desc&limit=50';
  if (filter && filter !== 'tutti') {
    url += '&device=eq.' + filter;
  }
  sbFetch(url).then(function(r) { return r.json(); }).then(function(logs) {
    var container = document.getElementById('logList');
    if (!container) return;
    var html = '';
    if (!logs || logs.length === 0) {
      html = '<div style="color:#888888;font-size:14px;padding:8px 0;">Nessun log</div>';
    }
    (logs || []).forEach(function(l) {
      var actionColor = '#1a1a1a';
      if (l.azione === 'sospeso') actionColor = '#C8102E';
      else if (l.azione === 'rientro') actionColor = '#1a7a4a';
      else if (l.azione === 'elimina_cliente') actionColor = '#C8102E';
      else if (l.azione === 'nuovo_cliente') actionColor = '#1E2D5A';

      html += '<div class="admin-log-item">';
      html += '<span class="admin-log-action" style="color:' + actionColor + '">' + escHtml(l.azione) + '</span>';
      if (l.delta !== null && l.delta !== undefined) {
        html += ' ' + formatEuro(Math.abs(parseFloat(l.delta)));
      }
      html += ' &middot; ' + escHtml(l.cliente_nome);
      html += '<div class="admin-log-detail">' + formatDateTime(l.ts) + ' &middot; ' + (l.device || '?');
      if (l.dettaglio) html += ' &middot; ' + escHtml(l.dettaglio);
      html += '</div></div>';
    });
    container.innerHTML = html;
  }).catch(function() {
    var container = document.getElementById('logList');
    if (container) container.innerHTML = '<div style="color:#C8102E;font-size:14px;padding:8px 0;">Errore caricamento log</div>';
  });
}

// ===== BACKUP =====
function exportJSON() {
  var data = { clienti: clienti, movimenti: movimenti, exportDate: Date.now(), device: DEVICE_ID };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'SALA_backup_' + DEVICE_ID + '_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('sala_last_backup_' + DEVICE_ID, String(Date.now()));
  showToast('Backup scaricato');
}

function exportBackupWA() {
  var data = { clienti: clienti.length, movimenti: movimenti.length, totaleAperto: 0, debitori: 0 };
  clienti.forEach(function(c) {
    var s = calcSaldo(c.id);
    if (s > 0) { data.totaleAperto += s; data.debitori++; }
  });
  var lines = [
    '*SALA Backup Info*',
    'Data: ' + formatDateTime(Date.now()),
    'Device: ' + DEVICE_ID,
    'Clienti: ' + data.clienti,
    'Movimenti: ' + data.movimenti,
    'Debitori: ' + data.debitori,
    'Totale aperto: ' + formatEuro(data.totaleAperto),
    '',
    '(Scarica il backup JSON dall\'app per il file completo)'
  ];
  var text = encodeURIComponent(lines.join('\n'));
  window.open('https://wa.me/?text=' + text, '_blank');
  localStorage.setItem('sala_last_backup_' + DEVICE_ID, String(Date.now()));
}

function importJSON(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.clienti || !data.movimenti) { showToast('File non valido'); return; }
      showModal(
        'Importa Backup',
        'Sovrascrivere tutti i dati con il backup? (' + data.clienti.length + ' clienti, ' + data.movimenti.length + ' movimenti)',
        [
          { text: 'Annulla', cls: 'modal-btn-cancel', action: function() { hideModal(); } },
          { text: 'Importa', cls: 'modal-btn-danger', action: function() {
            hideModal();
            doImport(data);
          }}
        ]
      );
    } catch(ex) { showToast('Errore lettura file'); }
  };
  reader.readAsText(file);
}

function doImport(data) {
  // Delete all, then insert
  showToast('Importazione in corso...');
  sbFetch('movimenti?id=gt.0', { method: 'DELETE' }).then(function() {
    return sbFetch('clienti?id=neq.null', { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
  }).then(function() {
    // Insert clienti
    return sbFetch('clienti', { method: 'POST', body: data.clienti });
  }).then(function() {
    // Insert movimenti (batch)
    var movs = data.movimenti.map(function(m) {
      var obj = { cliente_id: m.cliente_id, ts: m.ts, tipo: m.tipo, delta: m.delta, device: m.device };
      return obj;
    });
    return sbFetch('movimenti', { method: 'POST', body: movs });
  }).then(function() {
    return loadAll();
  }).then(function() {
    showToast('Backup importato!');
    renderAdmin();
  }).catch(function() {
    showToast('Errore importazione');
  });
}

// ===== PULL TO REFRESH =====
(function() {
  var wrapper = null;
  var indicator = null;
  var startY = 0;
  var pulling = false;

  function init() {
    wrapper = document.getElementById('clientListWrapper');
    indicator = document.getElementById('pullIndicator');
    if (!wrapper) return;

    wrapper.addEventListener('touchstart', function(e) {
      var list = document.getElementById('clientList');
      if (list.scrollTop <= 0) {
        startY = e.touches[0].pageY;
        pulling = true;
      }
    }, { passive: true });

    wrapper.addEventListener('touchmove', function(e) {
      if (!pulling) return;
      var dy = e.touches[0].pageY - startY;
      if (dy > 0 && dy < 120) {
        indicator.style.height = Math.min(dy * 0.6, 50) + 'px';
      }
    }, { passive: true });

    wrapper.addEventListener('touchend', function() {
      if (!pulling) return;
      pulling = false;
      var h = parseInt(indicator.style.height) || 0;
      indicator.style.height = '0px';
      if (h > 30) {
        loadAll();
        showToast('Aggiornato');
      }
    }, { passive: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 100);
  }
})();

// ===== MODAL =====
function showModal(title, text, buttons) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  var btnsHtml = '';
  buttons.forEach(function(b, i) {
    btnsHtml += '<div class="modal-btn ' + b.cls + '" id="modalBtn' + i + '">' + b.text + '</div>';
  });
  document.getElementById('modalBtns').innerHTML = btnsHtml;
  buttons.forEach(function(b, i) {
    document.getElementById('modalBtn' + i).onclick = b.action;
  });
  document.getElementById('modalOverlay').classList.add('visible');
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

// ===== TOAST =====
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ===== UTILS =====
function formatEuro(n) {
  return n.toFixed(2).replace('.', ',') + ' \u20AC';
}

function formatDate(ts) {
  var d = new Date(ts);
  return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear();
}

function formatDateTime(ts) {
  var d = new Date(ts);
  return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function escHtml(s) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(s));
  return div.innerHTML;
}

        e.preventDefault();
        processCommand();
      }
    });

});
